version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: levelbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-levelbot}
      POSTGRES_USER: ${DB_USER:-levelbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-levelbot123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-levelbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: levelbot-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  level-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: level-bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      GUILD_ID: ${GUILD_ID}
      PREFIX: ${PREFIX:-!}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-levelbot}
      DB_USER: ${DB_USER:-levelbot}
      DB_PASSWORD: ${DB_PASSWORD:-levelbot123}
      DATABASE_URL: postgresql://${DB_USER:-levelbot}:${DB_PASSWORD:-levelbot123}@postgres:5432/${DB_NAME:-levelbot}
      REDIS_URL: redis://redis:6379
      LEVEL_RECALC_INTERVAL_MS: ${LEVEL_RECALC_INTERVAL_MS:-300000}
      MIN_VOICE_SECONDS: ${MIN_VOICE_SECONDS:-60}
      NODE_ENV: ${NODE_ENV:-production}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: level-bot-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-levelbot}
      DB_USER: ${DB_USER:-levelbot}
      DB_PASSWORD: ${DB_PASSWORD:-levelbot123}
      DATABASE_URL: postgresql://${DB_USER:-levelbot}:${DB_PASSWORD:-levelbot123}@postgres:5432/${DB_NAME:-levelbot}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-900}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800}
      DISCORD_CLIENT_ID: ${CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: http://localhost:3000/auth/discord/callback
      GUILD_ID: ${GUILD_ID}
      API_PORT: 3000
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
      NODE_ENV: ${NODE_ENV:-production}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: level-bot-web
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
      NODE_ENV: ${NODE_ENV:-production}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  default:
    name: level-bot-network
    driver: bridge
