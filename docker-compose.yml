version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: levelbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-levelbot}
      POSTGRES_USER: ${DB_USER:-levelbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-levelbot123}
    ports:
      - "11900:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-levelbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  level-bot:
    build: .
    image: level-bot:latest
    container_name: level-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 1m30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    driver: local
